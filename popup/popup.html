<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="./popup.css" />
    </head>
    <body>
        <nav>
            <section class="logo">
                <img src="../assets/icon-48.png" alt="Logo" />
                <div class="settings">
                    <button type="button" class="theme-switcher">
                        <i class="fa-solid fa-circle-half-stroke"></i>
                    </button>
                    <button type="button" class="github-repo">
                        <i class="fa-brands fa-github"></i>
                    </button>
                </div>
            </section>
        </nav>
        <main>
            <section class="content-stats">
                <div class="prompt-number">
                    <h1>Total Prompt number</h1>
                    <p>12 prompts</p>
                </div>
                <div class="favourite-number">
                    <h1>Favourite Prompt number</h1>
                    <p>5 prompts</p>
                </div>
                <div class="most-used">
                    <h1>Most Used</h1>
                    <p>Explain like I'm 5</p>
                </div>
                <div class="export-status">
                    <h1>Last backup</h1>
                    <p>2 days ago</p>
                </div>
            </section>
        </main>
    </body>
</html>
